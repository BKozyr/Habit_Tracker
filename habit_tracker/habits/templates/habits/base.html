{% load static %}
<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Habit Tracker{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'habits/style.css' %}">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="{% url 'habits:habit_list' %}">🚀 Mój Tracker</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="{% url 'habits:habit_list' %}">Dashboard</a>
                <a class="nav-link" href="{% url 'habits:habit_create' %}">➕ Dodaj Nawyk</a>

                {% if user.is_authenticated %}
                    <div class="d-flex align-items-center gap-3">
                        <span>Cześć, <strong>{{ user.username }}</strong>!</span>

                        <form action="{% url 'logout' %}" method="post" class="m-0">
                            {% csrf_token %}
                            <button type="submit" class="btn btn-outline-danger btn-sm">Wyloguj się</button>
                        </form>
                    </div>
                {% else %}
                    <div>
                        <a href="{% url 'login' %}" class="btn btn-primary btn-sm">Zaloguj się</a>
                        <a href="{% url 'habits:register' %}" class="btn btn-outline-secondary btn-sm">Załóż konto</a>
                    </div>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

    <footer class="container text-center text-muted mt-5 mb-3">
        <small>&copy; 2026 Habit Tracker</small>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
