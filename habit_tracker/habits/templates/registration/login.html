{% extends "habits/base.html" %}
{% load crispy_forms_tags %}

{% block content %}
  <h2>Zaloguj się</h2>
  <form method="post">
    {% csrf_token %}
    {{ form|crispy }}
    <button type="submit" class="btn btn-primary">Zaloguj</button>
  </form>
  <p>Nie masz konta?</p>
  <a href="{% url 'habits:register' %}"> Zarejestruj się</a>
{% endblock %}
