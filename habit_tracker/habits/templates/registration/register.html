{% extends "habits/base.html" %}

{% block title %} Rejestracja {% endblock %}

{% block content %}
    <h2>Zarejestruj się</h2>

    <form method="POST">
        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit" class="btn btn-success">Załóż konto</button>
    </form>

    <p class="mt-3">Masz już konto? <a href="{% url 'login' %}">Zaloguj się</a></p>
{% endblock %}
